<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Planet Viewer</title>
    <link rel="icon" type="image/jpeg" href="assets/earth.jpg" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background: black">
    <!-- Planet selector -->
    <div id="planetBar">
      <span data-planet="mercury">Mercury</span>
      <span data-planet="venus">Venus</span>
      <span data-planet="earth">Earth</span>
      <span data-planet="mars">Mars</span>
      <span data-planet="jupiter" class="active">Jupiter</span>
      <span data-planet="saturn">Saturn</span>
      <span data-planet="uranus">Uranus</span>
      <span data-planet="nepture">Neptune</span>
    </div>

    <a
      id="githubLink"
      href="https://github.com/kunstewi/p5-planets"
      target="_blank"
    >
      <svg height="22" width="22" viewBox="0 0 16 16" fill="white">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 
    7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49
    -2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
    -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82
    .72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07
    -1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
    -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82
    .64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04
    2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
    1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54
    1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
    8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
        />
      </svg>
    </a>

    <style>
      #planetBar {
        position: absolute;
        top: 20px;
        width: 100%;
        text-align: center;
        color: white;
        font-family: sans-serif;
        z-index: 10;
      }

      #planetBar span {
        margin: 0 12px;
        cursor: pointer;
        opacity: 0.6;
        transition: 0.2s;
      }

      #planetBar span:hover {
        opacity: 1;
      }

      #planetBar .active {
        opacity: 1;
        border-bottom: 2px solid white;
      }

      #githubLink {
        position: absolute;
        top: 18px;
        right: 20px;
        opacity: 0.7;
        transition: 0.2s;
        z-index: 10;
      }

      #githubLink:hover {
        opacity: 1;
        transform: scale(1.1);
      }
    </style>

    <script src="controls.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
